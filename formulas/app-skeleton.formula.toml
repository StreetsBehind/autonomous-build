# app-skeleton: the first formula poured for any new app.
#
# Sets up project structure, dependency management, lint, test, CI scaffolding, README.

formula = "app-skeleton"
description = """
Initialize a new app — deps, lint/format, test framework, CI workflow, README.
"""
type = "workflow"
version = 1

[vars.app_name]
description = "Application name"
required = true

[vars.language]
description = "Primary language (e.g. typescript, python)"
required = true

[vars.framework]
description = "Framework (e.g. nextjs, fastapi)"
required = true

[vars.test_framework]
description = "Test framework (e.g. vitest, pytest)"
required = true

[vars.lint_tool]
description = "Lint/format tool (e.g. biome, ruff)"
required = true

[vars.package_manager]
description = "Package manager (npm | pnpm | uv | poetry | auto)"
default = "auto"

# =============================================================================

[[steps]]
id = "init-repo"
title = "Initialize {{app_name}} repository structure"
type = "chore"
priority = 1
description = """
Create the standard project layout for a {{framework}} app.

**Acceptance:**
- Root contains: README.md, .gitignore, dependency manifest
- Source layout follows {{framework}} conventions
- `git status` shows a clean tree after initial commit
"""

[[steps]]
id = "install-deps"
title = "Install {{framework}} dependencies via {{package_manager}}"
type = "chore"
priority = 1
needs = ["init-repo"]
description = """
Install runtime + dev dependencies for {{framework}}.

**Acceptance:**
- Lockfile present and committed
- `<package_manager> install --frozen-lockfile` succeeds
- Dev server / app entrypoint starts without import errors
"""

[[steps]]
id = "lint-format"
title = "Configure {{lint_tool}} for lint and format"
type = "chore"
priority = 2
needs = ["install-deps"]
description = """
Wire up {{lint_tool}} for the project.

**Acceptance:**
- {{lint_tool}} config committed at repo root
- `<package_manager> run lint` exits 0 on the empty project
- Editor config (.editorconfig) committed
"""

[[steps]]
id = "test-setup"
title = "Wire up {{test_framework}} with a smoke test"
type = "chore"
priority = 2
needs = ["install-deps"]
description = """
Get {{test_framework}} running with a single smoke test.

**Acceptance:**
- {{test_framework}} configured
- One smoke test exists and passes
- `<package_manager> run test` exits 0
"""

[steps.testPlan]
file = "tests/smoke.test"
cases = 1
coverage = "{{test_framework}} runs and exits 0"

[[steps]]
id = "ci"
title = "Add CI workflow (lint + test on PR)"
type = "chore"
priority = 3
needs = ["lint-format", "test-setup"]
description = """
GitHub Actions workflow for lint + test on push and PR.

**Acceptance:**
- .github/workflows/ci.yml runs lint and test on push and PR
- Workflow uses the same {{package_manager}} as local
"""

[[steps]]
id = "readme"
title = "Write project README"
type = "chore"
priority = 3
needs = ["init-repo"]
description = """
Author the project README.

**Acceptance:**
- README.md explains: what {{app_name}} does, how to run locally, how to test
- Links to deployment target (filled in later by deployment formula)
"""
