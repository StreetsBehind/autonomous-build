# auth-email-password: minimal email + password auth (signup, login, session, logout).
#
# Pours into 6 beads, each labelled "touches-auth" so /build-next's escalation
# pre-check can route them — the human confirms the cryptographic choices (hash
# parameters, session strategy, TTL, verification policy) at each step rather than
# the loop guessing.
#
# Explicitly out of scope (v1): OAuth, magic-link, MFA, password reset. Each gets
# its own follow-on formula (auth-oauth, auth-magic-link, auth-mfa,
# auth-password-reset). See autonomous-build-1zq.6 for the v1 formula library scope.

formula = "auth-email-password"
description = """
Minimal email + password auth: signup, login, session middleware, logout. Every step blocks for human confirmation of the cryptographic choices via the touches-auth label.
"""
type = "workflow"
version = 1

[vars.hash_strategy]
description = "Password hashing algorithm: argon2 | bcrypt | scrypt"
default = "argon2"

[vars.session_strategy]
description = "Session strategy: server-session (DB-stored sessions) | jwt (signed tokens, no server state)"
default = "server-session"

[vars.session_ttl_minutes]
description = "Session lifetime in minutes (default 1440 = 24h)"
default = "1440"

[vars.require_email_verification]
description = "If true, registration emits an unverified-status session and login requires verification"
default = "false"

# =============================================================================
# Schema
# =============================================================================

[[steps]]
id = "schema"
title = "auth: users + sessions schema"
type = "feature"
priority = 1
labels = ["touches-auth"]
files = [
  "migrations/*_auth.*",
  "db/migrations/*_auth.*",
  "models/User.*",
  "models/Session.*",
  "src/models/User.*",
  "src/models/Session.*",
]
description = """
Schema for users and session storage (when session_strategy={{session_strategy}}).

**Acceptance:**
- users table: id, email (unique), password_hash, created_at, updated_at; if require_email_verification, also email_verified_at (nullable)
- If session_strategy=server-session: sessions table with id, user_id (FK users), expires_at, created_at, last_seen_at
- If session_strategy=jwt: no sessions table; the JWT signing-key configuration lands in a separate config step (not this one)
- Migrations apply against a fresh DB and revert without orphaned objects

**Escalation:** /build-next blocks on touches-auth. Confirm column shape and indexes (email unique index, sessions FK + expires_at index) before unblocking.
"""

# =============================================================================
# Hashing primitives
# =============================================================================

[[steps]]
id = "password-hashing"
title = "auth: password hash + verify functions"
type = "feature"
priority = 1
needs = ["schema"]
labels = ["touches-auth"]
files = [
  "services/auth/passwords.*",
  "src/services/auth/passwords.*",
  "tests/services/auth/passwords.*",
]
description = """
Hash + verify primitives using hash_strategy={{hash_strategy}}.

**Acceptance:**
- hash(plaintext) returns an opaque encoded string including algorithm parameters
- verify(plaintext, hash) returns bool; uses a timing-safe compare
- Re-hashing the same plaintext yields a different output (salt is random)
- Library parameters (argon2 memory/iterations, bcrypt cost, scrypt N/r/p) are
  constants in this file — surface them for human review at escalation
- Plaintext password is never logged or returned

**Escalation:** /build-next blocks on touches-auth. Confirm algorithm parameters meet the application's threat model.
"""

[steps.testPlan]
file = "tests/services/auth/passwords.test"
cases = 4
coverage = "hash returns opaque encoded string; verify accepts correct plaintext; verify rejects wrong plaintext; verify uses timing-safe compare (no early return on first-byte mismatch)"

# =============================================================================
# Endpoints
# =============================================================================

[[steps]]
id = "register-endpoint"
title = "auth: POST /auth/register"
type = "feature"
priority = 2
needs = ["password-hashing"]
labels = ["touches-auth"]
files = [
  "routes/auth/register.*",
  "endpoints/auth/register.*",
  "src/routes/auth/register.*",
  "tests/endpoints/auth/register.*",
]
description = """
Register a new user with email + password.

**Acceptance:**
- POST /auth/register with {email, password} → 201 + session (or unverified status when require_email_verification=true)
- 400 on missing/malformed email or password below minimum length
- 409 on duplicate email
- Password is hashed via the password-hashing step's hash() before persist
- No password fields appear in the response body or logs

**Escalation:** /build-next blocks on touches-auth. Confirm rate-limit, minimum-password policy, and whether to reveal "email exists" via 409 vs. always returning 201 to prevent enumeration.
"""

[steps.testPlan]
file = "tests/endpoints/auth/register.test"
cases = 5
coverage = "201 + session cookie/token on valid input; 400 on missing email; 400 on missing password; 400 on password below minimum; 409 on duplicate email"

[[steps]]
id = "login-endpoint"
title = "auth: POST /auth/login"
type = "feature"
priority = 2
needs = ["password-hashing"]
labels = ["touches-auth"]
files = [
  "routes/auth/login.*",
  "endpoints/auth/login.*",
  "src/routes/auth/login.*",
  "tests/endpoints/auth/login.*",
]
description = """
Authenticate an existing user.

**Acceptance:**
- POST /auth/login with {email, password} → 200 + session
- 401 on bad password
- 401 on unknown user (do NOT differentiate from bad-password 401 — prevents enumeration)
- If require_email_verification and user is unverified: 403 with a verification-required signal (NOT 401, so unverified users get an actionable response)
- Password verify via the password-hashing step's verify()
- Session created per session_strategy={{session_strategy}}; session_ttl_minutes={{session_ttl_minutes}} applied as expires_at

**Escalation:** /build-next blocks on touches-auth. Confirm rate-limit on this endpoint — login is the brute-force target.
"""

[steps.testPlan]
file = "tests/endpoints/auth/login.test"
cases = 5
coverage = "200 + session on valid creds; 401 on bad password; 401 on unknown user (same response shape as bad password); 403 with verification-required signal when require_email_verification and user unverified; session expires_at matches session_ttl_minutes"

# =============================================================================
# Middleware
# =============================================================================

[[steps]]
id = "session-middleware"
title = "auth: request session middleware"
type = "feature"
priority = 2
needs = ["login-endpoint"]
labels = ["touches-auth"]
files = [
  "middleware/session.*",
  "src/middleware/session.*",
  "tests/middleware/session.*",
]
description = """
Request middleware that resolves an incoming session cookie/token into a user, exposed to downstream handlers.

**Acceptance:**
- Anonymous request (no cookie/token) → request.user is null; handlers gate accordingly
- Valid session → request.user is populated with {id, email, email_verified_at?}
- Expired session → request.user is null AND the stale session is invalidated (server-session: row deleted; jwt: not applicable since stateless)
- Tampered token (jwt strategy) → request.user is null; do not throw
- The middleware does NOT 401 by itself — that's the route handler's call

**Escalation:** /build-next blocks on touches-auth. Confirm whether session refresh-on-use is in scope here.
"""

[steps.testPlan]
file = "tests/middleware/session.test"
cases = 4
coverage = "anonymous request → no user; valid session → user populated; expired session → no user and server-session row removed; tampered jwt → no user (no throw)"

# =============================================================================
# Logout
# =============================================================================

[[steps]]
id = "logout-endpoint"
title = "auth: POST /auth/logout"
type = "feature"
priority = 3
needs = ["session-middleware"]
labels = ["touches-auth"]
files = [
  "routes/auth/logout.*",
  "endpoints/auth/logout.*",
  "src/routes/auth/logout.*",
  "tests/endpoints/auth/logout.*",
]
description = """
End the current session.

**Acceptance:**
- POST /auth/logout → 204; session is invalidated (server-session: row deleted; jwt: client-side cookie clear, server has nothing to do)
- A subsequent request with the invalidated session cookie → middleware reports no user
- Anonymous POST → 204 (idempotent; no error)

**Escalation:** /build-next blocks on touches-auth. Logout decisions are mostly stable; this is the lightest of the cluster.
"""

[steps.testPlan]
file = "tests/endpoints/auth/logout.test"
cases = 3
coverage = "204 on valid session; subsequent request shows no user; anonymous POST returns 204 (no error)"
