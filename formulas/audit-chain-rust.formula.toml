# audit-chain-rust: tamper-evident audit chain for SMBuild's Rust runtime.
#
# Per ADR 0002 directive #10 + ADR 0003 §Decision Audit chain: this scaffolds
# crates/smbuild-audit as the ONLY blessed writer of the audit_chain table.
# Bypass is a COMPILE-TIME error, not a lint suggestion — Rust's pub(crate)
# privacy + an xtask ban check enforce the chokepoint.
#
# Mirrors Jankurai's witness/receipt pattern (Jankurai/docs/merge-witness.md +
# Jankurai/docs/soc-ready-evidence.md): every append returns an AuditReceipt;
# a daily witness job anchors chain heads to S3 Object Lock cross-region —
# our external evidence trail (T-9 + SOC-ready-evidence philosophy).
#
# What this formula produces:
# - crates/smbuild-audit (the only crate with pub fn append)
# - sqlx forward migration creating audit_chain table + RLS policy + verify trigger
# - cargo-deny ban rule (via xtask) enforcing pub-fn-append-only path
# - crates/smbuild-worker/src/jobs/audit_witness.rs (daily anchor job)
# - tamper-detection integration test (proves the trigger raises on retroactive edits)
# - hash-chain round-trip integration test (proves chain is consistent across appends)
#
# Out of scope:
# - The composer's audit hooks — Phase 4 reads the receipt from append() and threads
#   it into composer.run-receipts. This formula provides the API; Phase 4 consumes it.
# - The xtask runner itself if not already present — the cargo-deny-audit-ban step
#   creates xtask/src/audit_chain_ban.rs and a check-audit-ban command; if a Cargo
#   xtask harness doesn't yet exist in the workspace, that step also wires it.
#
# Pour-time note: this formula is poured ONCE per app. It MUST be poured BEFORE
# any feature whose handler calls audit::append — in SMBuild Phase 1 the first
# consumer is Invoice (feature #12 in plan.md), so this formula must merge before
# Invoice's epic opens.

formula = "audit-chain-rust"
description = """
Scaffold SMBuild's tamper-evident audit chain in Rust: the smbuild-audit crate as the only blessed writer, the audit_chain Postgres table with RLS + hash-verify trigger, an AuditEvent trait carrying its scope as an associated const, a daily witness job anchoring chain heads to S3 Object Lock cross-region, an xtask cargo-deny ban enforcing the pub-fn-append-only path at CI time, and round-trip + tamper-detection integration tests against testcontainers Postgres. Poured ONCE per app, BEFORE any feature whose handler calls audit::append.
"""
type = "workflow"
version = 1

[vars.cron_schedule]
description = "Cron expression for the daily witness job that anchors chain heads to S3 Object Lock cross-region. Default '0 4 * * *' = 04:00 daily — quiet hour for ECS schedulers; Stripe webhooks have settled by then."
default = "0 4 * * *"

[vars.anchor_s3_bucket]
description = "S3 bucket holding daily audit-chain anchor envelopes. Must be Object-Lock-enabled in Compliance mode and cross-region-replicated (T-9 tamper-evident). The bucket is provisioned by the terraform-aws-baseline formula; this var just names it."
default = "smbuild-audit-anchors"

[vars.anchor_region_replica]
description = "Cross-region replica destination for the anchor bucket (T-9 defense in depth — single-region S3 outage does not destroy the only evidence of chain heads)."
default = "us-west-2"

