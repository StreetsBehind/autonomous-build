# Per-concern def schemas (parallel fan-out)
# =============================================================================

[[steps]]
id = "entity-defs"
title = "v{{version}}: defs/entity.schema.json (entities slot)"
type = "feature"
priority = 2
needs = ["create-version-dir"]
files = [
  "composer/grammar/v{{version}}/defs/entity.schema.json",
]
description = """
Author `defs/entity.schema.json` defining the shape of the `entities` slot in
tenant config (per the Bayou HVAC canonical example in ADR 0002).

**Shape:**
- `"type": "object"`
- `"additionalProperties": false`, `"unevaluatedProperties": false`
- `"properties":` one entry per Phase-1 entity (`customers`, `properties`, `jobs`, `crews`, `inventory`, `invoices`)
- Each entry is an object: `{ "enabled": boolean, "custom_fields": array }`
- `custom_fields` items have the shape from Phase-1 directive #4 + the Bayou HVAC example:
  ```
  {
    "type": "object",
    "additionalProperties": false,
    "required": ["key", "label", "type", "required"],
    "properties": {
      "key":       { "type": "string", "pattern": "^[a-z][a-z0-9_]*$" },
      "label":     { "type": "string", "minLength": 1 },
      "type":      { "type": "string", "enum": ["string","integer","number","boolean","enum","date"] },
      "options":   { "type": "array", "items": { "type": "string" } },
      "required":  { "type": "boolean" },
      "queryable": { "type": "boolean", "default": false }
    },
    "allOf": [
      { "if": { "properties": { "type": { "const": "enum" } }, "required": ["type"] },
        "then": { "required": ["options"] } }
    ]
  }
  ```

**Acceptance:**
- File written at `composer/grammar/v{{version}}/defs/entity.schema.json`
- Valid JSON; additionalProperties + unevaluatedProperties: false on EVERY object boundary
- Both literal HVAC custom_field entries from the ADR 0002 canonical example validate against this schema (verified manually by the builder before declaring acceptance; the formal check lives in meta-validation step's examples-validate phase)
"""

[[steps]]
id = "workflow-defs"
title = "v{{version}}: defs/workflow.schema.json (job_workflow slot)"
type = "feature"
priority = 2
needs = ["create-version-dir"]
files = [
  "composer/grammar/v{{version}}/defs/workflow.schema.json",
]
description = """
Author `defs/workflow.schema.json` for the `job_workflow` slot per the ADR 0002
example.

**Shape:**
- Object with `states` and `transitions` arrays
- `states[]`: object with `key` (snake_case string), `label` (string), `terminal` (bool), `color` (string from a fixed palette: blue, amber, green, slate, red — extend in v2 if a vertical needs it)
- `transitions[]`: object with `from` (key referencing a state key), `to` (same), `requires_role` (array of role keys)
- additionalProperties: false, unevaluatedProperties: false on EVERY object
- (Cross-key validity — e.g. `from` and `to` must reference declared state keys — is enforced at TENANT BOOT TIME by smbuild-grammar's typed validator, NOT by the schema. Schema-level enforcement is per-object; semantic refs are application-level. Comment this distinction in the schema's `description` field at the top.)

**Acceptance:**
- File written; valid JSON; closure flags on every object
- Validates the Bayou HVAC `job_workflow` block from ADR 0002 verbatim
"""

[[steps]]
id = "pricing-defs"
title = "v{{version}}: defs/pricing.schema.json (pricing_model slot)"
type = "feature"
priority = 2
needs = ["create-version-dir"]
files = [
  "composer/grammar/v{{version}}/defs/pricing.schema.json",
]
description = """
Author `defs/pricing.schema.json` for the `pricing_model` slot. Uses oneOf
keyed by `kind` per the four Phase-1 pricing kinds.

**Shape:**
- `"type": "object"`
- `"required": ["kind"]`
- `"oneOf"`: four branches discriminated by `kind`:
  - `flat_rate`: requires `flat_rate_book_ref` (string)
  - `hourly`: requires `hourly_rate_cents` (integer >= 0)
  - `flat_rate_with_estimate`: requires `flat_rate_book_ref`, `estimate_required_above_cents` (integer >= 0)
  - `time_and_materials`: requires `materials_markup_bps` (integer >= 0), `labor_hourly_cents` (integer >= 0)
- Common optional: `tax_rate_bps` (integer 0..10000)
- additionalProperties: false on the root AND on each branch
- unevaluatedProperties: false at the root (closes the oneOf — without this, oneOf escapes the closure and the composer can sneak unknown keys in)

**Acceptance:**
- File written; valid JSON; closure flags
- The Bayou HVAC `flat_rate_with_estimate` block from ADR 0002 validates verbatim
- An invalid mix (e.g. `kind: hourly` with `flat_rate_book_ref`) is REJECTED — the oneOf branch enforces per-kind exclusivity
"""

[[steps]]
id = "notification-defs"
title = "v{{version}}: defs/notifications.schema.json (notification trigger items)"
type = "feature"
priority = 2
needs = ["create-version-dir"]
files = [
  "composer/grammar/v{{version}}/defs/notifications.schema.json",
]
description = """
Author `defs/notifications.schema.json` — the shape of a SINGLE item in the
top-level `notifications: [...]` array.

**Shape:**
- `"type": "object"`
- `"required": ["trigger", "channel", "audience", "template_ref"]`
- Properties:
  - `trigger`: string, pattern matches event keys like `job.state.changed_to.<state_key>`, `invoice.sent`, `invoice.overdue.day_N`; pattern is permissive enough for the composer to emit valid event strings without requiring a closed enum (which would force a v-bump to add an event type — pattern is the right closure level for this slot)
  - `channel`: enum ["sms", "email"]
  - `audience`: enum ["customer", "tech", "owner"]
  - `template_ref`: string, references a NotificationTemplate row's `ref` column (validated semantically at tenant boot, not at schema time)
  - `condition_jsonpath`: optional string (JSONPath expression; semantic validity checked at boot)
  - `enabled`: boolean, default true
- additionalProperties: false, unevaluatedProperties: false

**Acceptance:**
- File written; valid JSON; closure flags
- All three Bayou HVAC notification entries from ADR 0002 validate verbatim
"""

