# composer-grammar-version: scaffold a new versioned grammar dir composer/grammar/v{N}/.
#
# Phase 1 use: `bd formula pour composer-grammar-version --var version=1` writes
# the entire v1 grammar (tenant.schema.json + defs/* + examples/* + Rust
# typify-generated zone declaration + TS json-schema-to-typescript zone
# declaration + meta-validation step). This satisfies ADR 0002 Decision A/B/G
# and Phase-1 directive items 1, 2, 13.
#
# Phase 4+ use: `bd formula pour composer-grammar-version --var version=2
# --var bump_from=1` adds composer/grammar/v2/ AND a migrations/from_v1.rs
# skeleton that is a pure function `v1::Tenant -> v2::Tenant` (per ADR 0002
# Decision E). Migration receipts are signed at runtime — not authored here.
#
# Out of scope for v1 — separate follow-on formulas:
# - Generating the typify proc-macro invocation (lives in crates/smbuild-
#   grammar/build.rs — this formula scaffolds the build.rs; the build.rs's
#   own evolution is owned by the grammar crate's beads)
# - Tenant config migration RUN (composer-tenant-migrate-run) — the per-tenant
#   migration application, receipt-emission, audit-chain-row formula
# - The composer LLM emission path (composer-emit-plan / composer-emit-compile
#   formulas) — Phase 4
#
# Dependency-graph design:
#   create-version-dir ──┬── entity-defs ──┐
#                        ├── workflow-defs ─┤
#                        ├── pricing-defs ──┤
#                        ├── notification-defs ──┤
#                        ├── branding-defs ──────┤── examples ── meta-validation
#                        └── roles-defs ─────────┘
#   create-version-dir ── generated-zone-declare ──┬── typify-config
#                                                  └── ts-codegen-config
#   version-bump-migration (only when version > 1) ── needs create-version-dir
#
# Phase-1 directive items (ADR 0002, non-negotiable):
#   #1 — JSON Schema 2020-12 from day one
#   #2 — composer/ as generated zone + boundary
#   #11 — universal schema (NOT per-tenant) — the schema in v{N} is the SAME
#         schema every tenant of v{N} validates against
#   #13 — additionalProperties: false AND unevaluatedProperties: false at every
#         object boundary — what makes the grammar closed (T-7)

formula = "composer-grammar-version"
description = """
Scaffold composer/grammar/v{N}/ — root tenant.schema.json + defs/*.schema.json + examples/* + typify (Rust) and json-schema-to-typescript (TS) generated-zone declarations + meta-validation. For version > 1 also writes a from_v{N-1}.rs migration skeleton (pure function v{N-1}::Tenant -> v{N}::Tenant).
"""
type = "workflow"
version = 1

[vars.version]
description = "Integer grammar version (>=1). Phase 1 pours version=1; Phase 4+ pours version=2 etc. when a breaking change requires it. Pre-transformed at pour time as a string; the schema files embed it as the URI segment `composer/grammar/v{{version}}/`."
required = true
default = "1"

[vars.bump_from]
description = "Integer = version - 1. Required when version > 1; ignored when version = 1. Drives the version-bump-migration step (skeleton for pure-function migration from v{{bump_from}}::Tenant to v{{version}}::Tenant per ADR 0002 Decision E)."
default = ""

# =============================================================================
# Bootstrap: create the version directory and the root tenant schema
# =============================================================================

[[steps]]
id = "create-version-dir"
title = "composer/grammar/v{{version}}: root tenant.schema.json"
type = "feature"
priority = 1
files = [
  "composer/grammar/v{{version}}/tenant.schema.json",
]
description = """
Author the root tenant schema for grammar version v{{version}}.

**Schema shape (non-negotiable per ADR 0002 Decision A + Phase-1 directive #1, #13):**
- `"$schema": "https://json-schema.org/draft/2020-12/schema"` (Draft 2020-12 only — Ajv 2020-12 mode on the TS side, jsonschema crate in 2020-12 mode on the Rust side)
- `"$id": "https://schemas.smbuild.io/composer/v{{version}}/tenant.schema.json"`
- `"type": "object"`
- `"additionalProperties": false` AND `"unevaluatedProperties": false` (T-7 closure — without both, oneOf escapes the closure)
- `"required": ["grammar_version", "tenant_id", "branding", "entities", "job_workflow", "pricing_model", "notifications", "roles"]`
- `"properties":` references the per-def files via `$ref`:
  - `"branding": { "$ref": "defs/branding.schema.json" }`
  - `"entities": { "$ref": "defs/entity.schema.json" }`
  - `"job_workflow": { "$ref": "defs/workflow.schema.json" }`
  - `"pricing_model": { "$ref": "defs/pricing.schema.json" }`
  - `"notifications": { "type": "array", "items": { "$ref": "defs/notifications.schema.json" } }`
  - `"roles": { "$ref": "defs/roles.schema.json" }`
  - `"grammar_version": { "type": "string", "const": "{{version}}.0.0" }`
  - `"tenant_id": { "type": "string", "pattern": "^[0-9A-HJKMNP-TV-Z]{26}$" }` (ULID)
- Reserved keys per ADR 0002 (`_grammar_version`, `_audit_chain_head`, `_tenant_id_assertion`) are NOT exposed as properties — the composer cannot emit them

**Acceptance:**
- File written at `composer/grammar/v{{version}}/tenant.schema.json`
- Valid JSON; opens in Ajv 2020-12 mode without errors
- `ajv compile --strict --spec=draft2020 composer/grammar/v{{version}}/tenant.schema.json` exits 0 (this is the meta-validation step's job; this step's acceptance is just "valid JSON shape")
- additionalProperties: false AND unevaluatedProperties: false present on every object boundary (verified by grep; if either is missing, BLOCK as T-7 violation)
"""

