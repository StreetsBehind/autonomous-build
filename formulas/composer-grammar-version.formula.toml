# =============================================================================
# Generated zone declarations + codegen wiring
# =============================================================================

[[steps]]
id = "generated-zone-declare"
title = "v{{version}}: declare generated zones in agent/generated-zones.toml"
type = "chore"
priority = 2
needs = ["create-version-dir"]
files = [
  "agent/generated-zones.toml",
]
description = """
Append two declarations to `agent/generated-zones.toml` so HLT-002 catches any
hand edit to the generated type files:

```
[[zone]]
path = "crates/smbuild-grammar/src/v{{version}}/types.rs"
generator = "typify"
source = "composer/grammar/v{{version}}/tenant.schema.json"
trip_on = ["any-hand-edit"]

[[zone]]
path = "frontend/src/composer/grammar/v{{version}}/types.gen.ts"
generator = "json-schema-to-typescript"
source = "composer/grammar/v{{version}}/tenant.schema.json"
trip_on = ["any-hand-edit"]
```

**Acceptance:**
- `agent/generated-zones.toml` exists (if not, it should have been created by app-skeleton-rust-cargo — if missing, BLOCK as a dependency-order error)
- The two `[[zone]]` blocks above are appended (idempotent: re-running this step does not duplicate them — dedupe by `path`)
- Jankurai `audit . --changed-fast` parses the file successfully
"""

[[steps]]
id = "typify-config"
title = "v{{version}}: crates/smbuild-grammar/build.rs typify invocation"
type = "feature"
priority = 3
needs = ["create-version-dir", "generated-zone-declare"]
files = [
  "crates/smbuild-grammar/build.rs",
  "crates/smbuild-grammar/Cargo.toml",
]
description = """
Wire `crates/smbuild-grammar/build.rs` to invoke `typify` on
`composer/grammar/v{{version}}/tenant.schema.json` and emit Rust types into
`crates/smbuild-grammar/src/v{{version}}/types.rs`.

**Pattern (typify build-script form):**
```rust
fn main() {
    println!("cargo:rerun-if-changed=../../composer/grammar/v{{version}}/tenant.schema.json");
    println!("cargo:rerun-if-changed=../../composer/grammar/v{{version}}/defs/");

    let mut settings = typify::TypeSpaceSettings::default();
    settings.with_derive("serde::Serialize".to_string())
            .with_derive("serde::Deserialize".to_string())
            .with_derive("Debug".to_string())
            .with_derive("Clone".to_string());

    let schema_text = std::fs::read_to_string("../../composer/grammar/v{{version}}/tenant.schema.json").unwrap();
    let schema: schemars::schema::RootSchema = serde_json::from_str(&schema_text).unwrap();

    let mut type_space = typify::TypeSpace::new(&settings);
    type_space.add_root_schema(schema).unwrap();

    let contents = format!("{}", type_space.to_stream());
    let out_dir = std::path::PathBuf::from(std::env::var("CARGO_MANIFEST_DIR").unwrap()).join("src/v{{version}}");
    std::fs::create_dir_all(&out_dir).unwrap();
    std::fs::write(out_dir.join("types.rs"), contents).unwrap();
}
```

For version > 1, the build.rs invokes typify for ALL versions in parallel (each
into its own `src/v{N}/types.rs`) — earlier versions remain present so per-
tenant runtime migration code can construct typed `v1::Tenant` and `v2::Tenant`
side-by-side.

**Acceptance:**
- `crates/smbuild-grammar/build.rs` exists (or is updated for version > 1 to add the new typify pass)
- `crates/smbuild-grammar/Cargo.toml` declares `[build-dependencies] typify = "0.x", serde_json = "1", schemars = "0.8"` (versions resolved at bead time against current crates.io)
- `cargo build -p smbuild-grammar` exits 0; `crates/smbuild-grammar/src/v{{version}}/types.rs` exists after the build
- The generated `Tenant` type is `pub struct Tenant { ... }` with fields matching the schema's required + optional properties
- The generated file is committed (per ADR 0003 hermetic build doctrine — generated zones are committed; build.rs is the regenerator, not the run-every-build emitter)
- Jankurai's `audit . --changed-fast` flags any hand edit to `src/v{{version}}/types.rs` (HLT-002 — verifies the generated-zone-declare step's wiring)
"""

[[steps]]
id = "ts-codegen-config"
title = "v{{version}}: frontend json-schema-to-typescript wiring"
type = "feature"
priority = 3
needs = ["create-version-dir", "generated-zone-declare"]
files = [
  "frontend/package.json",
  "frontend/scripts/gen-grammar-types.mjs",
]
description = """
Add a `pnpm` script and a small Node script that runs
`json-schema-to-typescript` against `composer/grammar/v{{version}}/tenant.schema.json`
and writes the result to `frontend/src/composer/grammar/v{{version}}/types.gen.ts`.

**`frontend/package.json` additions:**
- `"devDependencies": { "json-schema-to-typescript": "^15.x" }` (resolved at bead time)
- `"scripts": { "gen:grammar:v{{version}}": "node scripts/gen-grammar-types.mjs --version {{version}}", "gen:grammar": "pnpm gen:grammar:v{{version}}" }` (for version > 1, `gen:grammar` runs both: `pnpm gen:grammar:v1 && pnpm gen:grammar:v2`)

**`frontend/scripts/gen-grammar-types.mjs`** (new file for v=1; updated to handle multiple versions when version > 1):
- Reads `composer/grammar/v{N}/tenant.schema.json`
- Calls `compileFromFile()` with the schema's $defs resolved via the package's bundling support
- Writes `frontend/src/composer/grammar/v{N}/types.gen.ts` with a generated-zone header comment (`// generated-zone: do not hand-edit — regenerate via pnpm gen:grammar`)

**Acceptance:**
- `frontend/package.json` has the dep and the scripts
- `frontend/scripts/gen-grammar-types.mjs` exists and runs: `pnpm gen:grammar:v{{version}}` exits 0
- `frontend/src/composer/grammar/v{{version}}/types.gen.ts` is generated and contains a `Tenant` type that compiles under `tsc --noEmit`
- The generated file is committed (same hermetic-build doctrine as Rust)
- Re-running `pnpm gen:grammar:v{{version}}` produces zero git diff (deterministic codegen per T-11)
"""

# =============================================================================
# Meta-validation (CI gate)
# =============================================================================

[[steps]]
id = "meta-validation"
title = "v{{version}}: Ajv meta-validation + examples validate against tenant.schema.json"
type = "feature"
priority = 3
needs = ["examples"]
files = [
  ".github/workflows/composer-grammar-validate.yml",
  "scripts/validate-grammar.sh",
]
description = """
Add a CI step that:
1. Validates `composer/grammar/v{{version}}/tenant.schema.json` against the JSON Schema 2020-12 meta-schema (`ajv compile --strict --spec=draft2020`)
2. Validates each `composer/grammar/v{{version}}/examples/*.tenant.json` against `composer/grammar/v{{version}}/tenant.schema.json`
3. Verifies every object boundary in the schema files has `additionalProperties: false` AND `unevaluatedProperties: false` (T-7 closure check; T-13 quality gate). Implemented as a small jq pipeline in `scripts/validate-grammar.sh`.

For version > 1, the CI step runs the validation matrix for v1, v2, ..., v{{version}} — earlier versions remain validated so a v-bump cannot silently break older tenant configs.

**Acceptance:**
- `scripts/validate-grammar.sh` exists and exits 0 against the freshly poured grammar
- `.github/workflows/composer-grammar-validate.yml` runs the script on every PR
- Running the script against an INTENTIONALLY broken example (drop a required field) makes it exit non-zero — verified by the bead's own quality gate via a temp broken file (cleaned up before commit)
- For version > 1: the v{{bump_from}} examples STILL validate against v{{bump_from}}/tenant.schema.json (per ADR 0002 Decision E channel 1 + 2: additive is non-breaking; if `bump_from` validation fails on a freshly poured v{{version}} branch, BLOCK as a Decision E violation — the v-bump may have unintentionally broken back-compat)
"""

# =============================================================================
# Version-bump migration (only when version > 1)
# =============================================================================

[[steps]]
id = "version-bump-migration"
title = "v{{version}}: pure-function migration from_v{{bump_from}} (skipped when version=1)"
type = "feature"
priority = 3
needs = ["create-version-dir"]
files = [
  "composer/grammar/v{{version}}/migrations/from_v{{bump_from}}.rs",
  "composer/grammar/v{{version}}/migrations/from_v{{bump_from}}_test.rs",
]
description = """
Per ADR 0002 Decision E: a breaking grammar change requires a pure-function
migration `v{{bump_from}}::Tenant -> v{{version}}::Tenant`.

**Skip-at-pour-time:** if `version=1` (and thus `bump_from=""`), this step is
a no-op. The builder closes with "no-op: version=1; no prior version to migrate
from" and creates no file. This matches the `idempotency-guard` pattern from
`background-job.formula.toml`.

**When version > 1, the skeleton (the bead implements the actual transforms;
the formula scaffolds the function shape):**

`composer/grammar/v{{version}}/migrations/from_v{{bump_from}}.rs`:
```rust
//! Migration v{{bump_from}}.Tenant -> v{{version}}.Tenant.
//!
//! Pure function — deterministic, no I/O. Per ADR 0002 Decision E:
