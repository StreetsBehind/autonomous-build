# app-skeleton: the first formula poured for any new app.
# Sets up project structure, dependency management, lint, test, CI scaffolding, README.
#
# NOTE: schema is first-cut. Validate with `bd cook app-skeleton --dry-run --var ...`
# inside a bd-initialized project before relying on it.

name: app-skeleton
description: Initialize a new app — deps, lint/format, test framework, CI workflow, README.

variables:
  - name: app_name
    required: true
  - name: language
    required: true                # e.g. "typescript", "python"
  - name: framework
    required: true                # e.g. "nextjs", "fastapi"
  - name: test_framework
    required: true                # e.g. "vitest", "pytest"
  - name: lint_tool
    required: true                # e.g. "biome", "ruff"
  - name: package_manager
    default: "auto"               # "npm" | "pnpm" | "uv" | "poetry" | "auto"

steps:
  - id: init-repo
    title: "Initialize {{app_name}} repository structure"
    type: chore
    priority: 1
    description: |
      Create the standard project layout for a {{framework}} app.
    acceptance: |
      - Root contains: README.md, .gitignore, dependency manifest
      - Source layout follows {{framework}} conventions
      - `git status` shows a clean tree after initial commit

  - id: install-deps
    title: "Install {{framework}} dependencies via {{package_manager}}"
    type: chore
    priority: 1
    depends_on: [init-repo]
    acceptance: |
      - Lockfile present and committed
      - `<package_manager> install --frozen-lockfile` succeeds
      - Dev server / app entrypoint starts without import errors

  - id: lint-format
    title: "Configure {{lint_tool}} for lint and format"
    type: chore
    priority: 2
    depends_on: [install-deps]
    acceptance: |
      - {{lint_tool}} config committed at repo root
      - `<package_manager> run lint` exits 0 on the empty project
      - Editor config (.editorconfig) committed

  - id: test-setup
    title: "Wire up {{test_framework}} with a smoke test"
    type: chore
    priority: 2
    depends_on: [install-deps]
    acceptance: |
      - {{test_framework}} configured
      - One smoke test exists and passes
      - `<package_manager> run test` exits 0

  - id: ci
    title: "Add CI workflow (lint + test on PR)"
    type: chore
    priority: 3
    depends_on: [lint-format, test-setup]
    acceptance: |
      - .github/workflows/ci.yml runs lint and test on push and PR
      - Workflow uses the same {{package_manager}} as local

  - id: readme
    title: "Write project README"
    type: chore
    priority: 3
    depends_on: [init-repo]
    acceptance: |
      - README.md explains: what {{app_name}} does, how to run locally, how to test
      - Links to deployment target (filled in later by deployment formula)
