# =============================================================================
# Backend test layer — tonic integration test against testcontainers Postgres
# =============================================================================

[[steps]]
id = "tonic-integration-test"
title = "{{entity}}: tonic integration test (Create->Get->List->Update->Delete with RLS active)"
type = "feature"
priority = 2
needs = ["tonic-service-impl"]
files = [
  "crates/smbuild-api/tests/{{entity_snake}}_crud.rs",
]
description = """
Full CRUD round-trip integration test against a real Postgres provisioned by
testcontainers-rs (T-14 proof not assertion — no DB mocks, no sqlx stubs).

**Test setup:**
- testcontainers-rs spins Postgres 16 with `pgcrypto`, `citext`, `pg_trgm`, `pgvector` extensions enabled (matches RDS Phase 1 config in plan.md)
- Applies all migrations via `sqlx::migrate!("./db/migrations")`
- Boots a single test tenant: inserts a Tenant row in the control-plane equivalent and one Membership; sets `app.current_tenant_id` via the TenantCtx tower layer driven by a hand-issued test JWT
- Spawns the Axum server on a random port; uses tonic's generated client to dial it (`{{entity}}ServiceClient::connect(...)`)
- OpenFGA: uses a real OpenFGA container OR (if openfga-rs test-fixture exists) an in-memory FGA store. The trades-seed tuples from the openfga-tuples step are loaded; the test's user has the `role:owner` mapping so all RPCs are authorized.

**Test cases:**
1. Create: `Create{{entity}}` with valid request -> returns `{{entity}}` with non-empty id, tenant_id matching the test tenant, created_at/updated_at populated, extensions empty
2. Get: `Get{{entity}}` with the created id -> returns the same row
3. List: insert two more rows via Create; `List{{entity_plural}}` returns all three ordered by id
4. List pagination: `List{{entity_plural}}` with page_size=2 -> returns 2 items + non-empty page_token; passing the token returns the third
5. Update: `Update{{entity}}` with a partial body -> returns updated row; subsequent Get reflects the change; updated_at > created_at
6. Delete: `Delete{{entity}}` with the id -> returns empty response; subsequent Get returns `Status::not_found`
7. Validation: `Create{{entity}}` with a required field omitted -> returns `Status::invalid_argument`

**Acceptance:**
- File written at `crates/smbuild-api/tests/{{entity_snake}}_crud.rs`
- `cargo nextest run -p smbuild-api --test {{entity_snake}}_crud` passes
- Test does NOT mock the DB, the FGA client, or the JWT verifier (T-14)
- Test container reuse: marked with `#[cfg_attr(feature = "testcontainers-reuse", reuse)]` per the workspace's nextest profile (so the container is shared across all entity tests on the same nextest run, keeping the inner loop fast)
"""

[steps.testPlan]
