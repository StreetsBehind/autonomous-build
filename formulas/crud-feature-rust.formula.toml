# =============================================================================
# T-8 proof — per-entity cross-tenant isolation invariant test
# =============================================================================

[[steps]]
id = "cross-tenant-isolation-test"
title = "{{entity}}: cross-tenant isolation invariant test (RLS proof)"
type = "feature"
priority = 2
needs = ["tonic-service-impl"]
files = [
  "crates/smbuild-api/tests/isolation_{{entity_snake}}.rs",
]
description = """
Per-entity proof that tenant A cannot read or write tenant B's
{{entity_snake_plural}} rows. This is the T-8 invariant test, run for EVERY
crud-feature-rust pour — tenant isolation is a per-entity proof, not a
global one (one missed RLS policy on one new table is a leak).

**Test shape (table-driven):**
- testcontainers Postgres + all migrations applied
- Boot TWO tenants: tenant_a (id = ULID_A), tenant_b (id = ULID_B); membership rows for one user per tenant
- Tenant A's connection sets `app.current_tenant_id = ULID_A`; insert 3 rows of {{entity}}
- Tenant B's connection sets `app.current_tenant_id = ULID_B`; insert 2 rows of {{entity}}
- Assertions (all MUST pass; any failure is a T-8 violation and the bead BLOCKS):
  a. `List{{entity_plural}}` on tenant_a's connection returns 3 rows; on tenant_b's returns 2 rows
  b. `Get{{entity}}` on tenant_a's connection for one of tenant_b's row ids returns `Status::not_found` (NOT permission_denied — RLS makes the row invisible, not forbidden)
  c. `Update{{entity}}` on tenant_a's connection for a tenant_b row id returns `Status::not_found` and the row in tenant_b's DB is UNCHANGED (verified by re-fetching as tenant_b)
  d. `Delete{{entity}}` on tenant_a's connection for a tenant_b row id returns `Status::not_found` and the row in tenant_b's DB still exists
  e. Direct sqlx query bypass attempt: `sqlx::query!("SELECT count(*) FROM {{entity_snake_plural}}")` run on tenant_a's connection returns 3, not 5. If it returns 5, RLS is not FORCE'd and the bead BLOCKS as a security floor violation per tiebreaker #1.
  f. tenant_a attempting to INSERT a row with `tenant_id = ULID_B` is rejected by the RLS policy (the WITH CHECK clause; if migration omitted WITH CHECK, the policy is incomplete and the bead BLOCKS)

**Acceptance:**
- File written at `crates/smbuild-api/tests/isolation_{{entity_snake}}.rs`
- `cargo nextest run -p smbuild-api --test isolation_{{entity_snake}}` passes
- All six assertions (a-f) are individual `#[test]` or table-driven `proptest!` cases (proptest can fuzz the rows-per-tenant counts; deterministic seed for repeatability per T-11)
- Test does NOT mock RLS, does NOT mock the DB, does NOT use a special test-only role with BYPASSRLS (those would invalidate the test per T-14)
- The test is required by the bead's quality gate; if it fails, the bead BLOCKS per tiebreaker #1 (security floor). Do NOT relax the test to ship the bead.
"""

[steps.testPlan]
file = "crates/smbuild-api/tests/isolation_{{entity_snake}}.rs"
cases = 6
coverage = "tenant A's List returns only A's rows; tenant A's Get for B's id is NotFound; tenant A's Update for B's id is NotFound and B's row unchanged; tenant A's Delete for B's id is NotFound and B's row still exists; direct sqlx SELECT on A's connection cannot see B's rows (FORCE RLS); INSERT with foreign tenant_id rejected by RLS WITH CHECK"
