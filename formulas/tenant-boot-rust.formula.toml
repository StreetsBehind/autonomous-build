# =============================================================================
# crates/smbuild-api/src/tenant/boot.rs â€” THE chokepoint fn
# =============================================================================

[[steps]]
id = "boot-tenant-fn"
title = "boot_tenant: load grammar + metadata, return TenantRuntime"
type = "feature"
priority = 3
needs = ["composer-must-validate", "tenant-runtime-struct"]
files = [
  "crates/smbuild-api/src/tenant/boot.rs",
  "crates/smbuild-api/src/tenant/cache.rs",
  "crates/smbuild-api/src/tenant/error.rs",
]
description = """
Implement `boot_tenant`, the single function called at process start for every tenant the API serves. Its signature is the contract for Phases 1->3->4 (ADR 0002 directive #9).

**Locked signature (do not drift, ever):**
```rust
pub async fn boot_tenant(
    pool: &sqlx::PgPool,
    tenant_id: smbuild_tenantctx::TenantId,
) -> Result<std::sync::Arc<TenantRuntime>, BootError>;
```

(The lock is enforced by the `phase4-stability-test` step.)

**Phase-1 body:**
1. Check the per-(tenant_id, grammar_version) cache. Cache TTL = {{cache_ttl_secs}}s. Hit -> return cached `Arc<TenantRuntime>`.
2. Load the bootstrap tenant config. Phase 1: read from `composer/grammar/v1/examples/hvac.tenant.json` (the canonical HVAC example in ADR 0002). Phase 3 will swap this read to come from the control-plane `tenants` table via `connection_secret_ref`. Phase 4 lets the composer write the row. The READ source changes; the SHAPE does not (always raw bytes -> `must_validate`).
3. Call `composer::must_validate(raw)` -> `ApprovedConfig`. On error -> `BootError::Validation(e)`. (Note: this is the WRITE-side chokepoint. The composer cannot bypass.)
4. With the pool, fetch rows for this tenant from these metadata tables (all RLS-protected, all set up by `db/migrations/000001_init.up.sql`):
   - `entity_field_definitions` -> build per-EntityType FieldValidator
   - `job_statuses` + `job_status_transitions` -> JobStateMachine
   - `notification_triggers` + `notification_templates` -> notification dispatch tables
   - `pricing_rules` -> pricing config
   - `roles` (+ implied `role_permissions`) -> role lookup
   - `branding_tokens` -> BrandingTokens
   The connection acquired for this load MUST `SET LOCAL app.current_tenant_id = $1` before any select so RLS is active. Use a transaction.
5. Construct `TenantRuntime::from_loaded(approved_config, validators, branding, job_state_machine, ...)`. Wrap in `Arc`.
6. Insert into cache. Return.

**BootError shape:**
```rust
pub enum BootError {
    Validation(crate::composer::ValidationError),
    MetadataLoad(sqlx::Error),
    TenantNotFound { tenant_id: TenantId },
    GrammarMismatch { config_says: u32, db_says: u32 },  // tenant row's grammar_version differs from config's
}
```

**Acceptance:**
- `crates/smbuild-api/src/tenant/boot.rs` exports `pub async fn boot_tenant(pool: &sqlx::PgPool, tenant_id: TenantId) -> Result<Arc<TenantRuntime>, BootError>` â€” exact signature
- Phase 1 reads `composer/grammar/v1/examples/hvac.tenant.json` via `include_str!` (deterministic, no runtime FS dependency)
- The loader transaction issues `SET LOCAL app.current_tenant_id = $1` before any SELECT against tenant-scoped tables
- Cache is a `tokio::sync::RwLock<HashMap<(TenantId, u32), (Instant, Arc<TenantRuntime>)>>` with {{cache_ttl_secs}}s TTL; cache module exposes a sync `pub(crate) fn invalidate(tenant_id: TenantId)` for Phase-4 composer pokes (declared but unused in Phase 1)
- `cargo check -p smbuild-api` succeeds
"""

# =============================================================================
# Axum tower middleware: per-request boot + Extension wiring
# =============================================================================

[[steps]]
id = "tenant-axum-middleware"
title = "Axum tower::Layer that runs boot_tenant per request + sets RLS GUC"
type = "feature"
priority = 3
needs = ["boot-tenant-fn"]
files = [
  "crates/smbuild-api/src/transport/tenant_layer.rs",
  "crates/smbuild-api/src/transport/mod.rs",
]
description = """
Implement `TenantLayer` (a `tower::Layer`) and its `Service` so every request runs through tenant boot before the handler sees it.

**Behavior:**
1. The layer extracts the tenant_id from the request (Phase 1: from the Zitadel OIDC claim's `tenant_id` extension, or a header `X-Smbuild-Tenant` in dev mode; the source is encapsulated in a `TenantIdExtractor` trait so Phase 3 can swap).
2. Calls `boot_tenant(&pool, tenant_id).await`. On `BootError` -> respond `503 Service Unavailable` for transient (MetadataLoad), `404 Not Found` for TenantNotFound, `500 Internal Server Error` for Validation/GrammarMismatch (these are config-time bugs, not request-time).
3. Acquires a connection from the pool for the request, runs `SET LOCAL app.current_tenant_id = $1` on it inside a transaction, and stashes the connection in a request extension so downstream handlers reuse the same RLS-scoped connection (otherwise RLS resets between checkouts â€” this is the load-bearing trick).
4. Attaches `Extension<TenantCtx>` and `Extension<Arc<TenantRuntime>>` to the request.
5. Calls the inner service.

**Why this matters (T-8 invariant):** every handler downstream of this layer reads `Extension<TenantCtx>` for the tenant identity and `Extension<Arc<TenantRuntime>>` for branding/validators/state machine. There is no alternative path. Compile-time chokepoint.

**Acceptance:**
- `crates/smbuild-api/src/transport/tenant_layer.rs` exposes `pub struct TenantLayer { pool: sqlx::PgPool, extractor: Arc<dyn TenantIdExtractor> }` and `impl<S> tower::Layer<S> for TenantLayer`
- Per-request execution path: extract tenant_id -> boot_tenant -> acquire txn-bound conn -> SET LOCAL app.current_tenant_id -> insert request extensions -> call inner
- Error mapping: BootError::Validation/GrammarMismatch -> 500; BootError::TenantNotFound -> 404; BootError::MetadataLoad -> 503
- A `tower::ServiceBuilder` test wires up a trivial inner service and asserts the extensions are present and the GUC was set (read it back via `SHOW app.current_tenant_id`)
- `cargo nextest run -p smbuild-api transport::tenant_layer` passes
"""

[steps.testPlan]
file = "crates/smbuild-api/src/transport/tenant_layer.rs"
cases = 3
coverage = "happy path: TenantCtx + Arc<TenantRuntime> visible to inner service; happy path: SHOW app.current_tenant_id returns the bound id (proves RLS GUC is set on the conn the inner service reuses); BootError::TenantNotFound returns 404 without invoking inner"

# =============================================================================
# Signature lock â€” Phase 4 stability test
# =============================================================================

[[steps]]
id = "phase4-stability-test"
title = "Doc-test locking boot_tenant's public signature"
type = "feature"
priority = 4
needs = ["boot-tenant-fn"]
files = [
  "crates/smbuild-api/src/tenant/boot.rs",
]
description = """
Add a doc-test in `crates/smbuild-api/src/tenant/boot.rs` that snapshots `boot_tenant`'s public signature. If a future bead (Phase 3 BYO-DB; Phase 4 composer) drifts the signature, the doc-test fails to compile.

**The doc-test:**
```rust
/// // Phase-4 stability lock: type-only assertion â€” the function pointer cast
/// // fails to compile if the signature drifts in ANY way (arg count, arg
/// // types, return type, asyncness).
/// ```
/// use smbuild_api::tenant::{boot_tenant, BootError, TenantRuntime};
/// use std::sync::Arc;
/// use smbuild_tenantctx::TenantId;
/// const _: fn(&sqlx::PgPool, TenantId) -> std::pin::Pin<Box<
///     dyn std::future::Future<Output = Result<Arc<TenantRuntime>, BootError>> + Send
/// >> = |pool, tid| Box::pin(boot_tenant(pool, tid));
/// ```
```

If anyone in Phase 3 or Phase 4 adds a parameter, removes async, changes the return type, or renames TenantRuntime -> BootResult, this doc-test refuses to compile. Phase 4's composer can extend the BODY (new arms inside boot.rs) freely; it cannot widen the contract without explicit human ratification (T-25 enforcement at the type level).

**Acceptance:**
- The doc-test block is present in `crates/smbuild-api/src/tenant/boot.rs` immediately above the `pub async fn boot_tenant` declaration with a comment header reading `// PHASE 4 STABILITY LOCK â€” DO NOT EDIT WITHOUT TENETS.md Â§6 AMENDMENT`
- `cargo test -p smbuild-api --doc tenant::boot` passes against the current (Phase 1) signature
- A negative-control bead test (run during /decompose's quality audit, not committed code): briefly edit `boot_tenant` to add an extra `&str` arg, re-run the doc-test, confirm it fails to compile â€” then revert. The doc-test PROVES the lock works.
"""

[steps.testPlan]
file = "crates/smbuild-api/src/tenant/boot.rs"
cases = 1
coverage = "doc-test asserts boot_tenant's exact signature (pin<box<future<output=Result<Arc<TenantRuntime>, BootError>>>>); any drift -> compile error"

