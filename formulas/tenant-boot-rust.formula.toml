Define the TenantRuntime struct â€” the per-request handle every handler reads from. This is the runtime materialization of the validated ApprovedConfig plus the per-entity validators built from `entity_field_definitions` rows.

**Shape:**
```rust
pub struct TenantRuntime {
    pub config: ApprovedConfig,
    pub validators: HashMap<EntityType, FieldValidator>,   // built from entity_field_definitions
    pub branding: BrandingTokens,                          // from branding_tokens table
    pub job_state_machine: JobStateMachine,                // from job_statuses + job_status_transitions
