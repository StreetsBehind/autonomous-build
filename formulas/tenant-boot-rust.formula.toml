# crates/smbuild-api/src/domain/approved_config.rs â€” ApprovedConfig newtype
# =============================================================================

[[steps]]
id = "approved-config-newtype"
title = "ApprovedConfig newtype with no public constructor"
type = "feature"
priority = 1
needs = ["tenantctx-crate"]
files = [
  "crates/smbuild-api/src/domain/approved_config.rs",
  "crates/smbuild-api/src/domain/mod.rs",
]
description = """
Create the ApprovedConfig newtype in crates/smbuild-api/src/domain/approved_config.rs. This is the runtime-side proof that a tenant config has passed the closed-grammar validator (T-7).

**The privacy chokepoint:**
```rust
// crates/smbuild-api/src/domain/approved_config.rs
use smbuild_grammar::v1::TenantConfig;  // typify-generated zone

pub struct ApprovedConfig {
    inner: TenantConfig,
    grammar_version: u32,
    config_hash: [u8; 32],  // sha256(canonical_json); used by audit chain
}

impl ApprovedConfig {
    // Only composer::must_validate may construct one.
    pub(crate) fn from_validated(inner: TenantConfig, grammar_version: u32, config_hash: [u8; 32]) -> Self {
        Self { inner, grammar_version, config_hash }
    }
    pub fn inner(&self) -> &TenantConfig { &self.inner }
    pub fn grammar_version(&self) -> u32 { self.grammar_version }
    pub fn config_hash(&self) -> &[u8; 32] { &self.config_hash }
}
```

- NO `pub fn new`. NO `Deserialize` derive that bypasses validation. NO `From<TenantConfig>` impl.
- Calling code accepts `&ApprovedConfig` parameters only. Passing raw bytes is a compile error â€” there is no `From<&[u8]>` or `TryFrom<&[u8]>` impl.
- `pub(crate)` constructor means only code inside `smbuild-api` can call it; only `composer::must_validate` does call it.

**Acceptance:**
- `crates/smbuild-api/src/domain/approved_config.rs` exists with the shape above; `domain/mod.rs` re-exports `pub use approved_config::ApprovedConfig;`
- The file has NO `pub fn new(...)`, NO `impl From<TenantConfig> for ApprovedConfig`, NO `impl Default`, NO `#[derive(Deserialize)]`
- A doc-test asserts: outside the crate, `let _ = ApprovedConfig::from_validated(...);` is a `compile_fail` (proves the `pub(crate)` boundary)
- `cargo clippy -p smbuild-api --all-targets -- -D warnings` passes
"""

[steps.testPlan]
file = "crates/smbuild-api/src/domain/approved_config.rs"
cases = 1
coverage = "compile_fail doc-test confirms external code cannot construct ApprovedConfig (proves the pub(crate) chokepoint is real, not aspirational)"

# =============================================================================
# crates/smbuild-api/src/composer/must_validate.rs â€” the validator
# =============================================================================

[[steps]]
id = "composer-must-validate"
title = "composer::must_validate â€” closed-grammar JSON Schema chokepoint"
type = "feature"
priority = 2
needs = ["approved-config-newtype"]
files = [
  "crates/smbuild-api/src/composer/must_validate.rs",
  "crates/smbuild-api/src/composer/mod.rs",
  "crates/smbuild-api/src/composer/error.rs",
]
description = """
Implement the `must_validate` function â€” the ONLY way to obtain an ApprovedConfig.

**Signature:**
```rust
pub fn must_validate(raw: &[u8]) -> Result<ApprovedConfig, ValidationError>;
```

**Behavior:**
1. Parse `raw` as JSON. On parse error -> `ValidationError::Malformed { line, col, msg }`.
2. Read the top-level `grammar_version` string (per ADR 0002 Â§Concrete tenant config: `"grammar_version": "1.0.0"`). Map the major version (`1`) to the schema directory `composer/grammar/v1/tenant.schema.json`. Unknown major -> `ValidationError::UnsupportedGrammar { version }`. Phase 1 supports v1 only â€” the match arm reads `1 => v1::TENANT_SCHEMA`, all others fall through to the error.
3. Compile the schema using the `jsonschema` crate (draft 2020-12 mode), validate against it. Closed-grammar (T-7) means `additionalProperties: false` at every object boundary â€” an unknown top-level key MUST fail validation.
4. Deserialize the validated JSON into `smbuild_grammar::v1::TenantConfig` (the typify-generated newtype zone). Deserialization can still fail on structural mismatch â€” return `ValidationError::Deserialize(err)` if it does.
5. Compute `sha256(canonical_json(parsed))` for the audit chain hook (T-9 reproducibility).
6. Return `Ok(ApprovedConfig::from_validated(typed, major_version, hash))`.

**Schema reference loading:** the schema files live under `composer/grammar/v1/`. The build.rs in smbuild-api uses `include_str!` to embed them at compile time so runtime has no file-system dependency (T-11 deterministic).

**Acceptance:**
- `must_validate` exists with the exact signature above
- Validates against `composer/grammar/v1/tenant.schema.json` for grammar_version major `1`
- Test asserts: a config with an unknown top-level key (e.g. `"frobnicate": true`) fails with `Schema(_)` whose error path is `/frobnicate` and message mentions `additionalProperties` â€” this PROVES the closed-grammar invariant is wired, not aspirational
- Test asserts: a config missing `grammar_version` fails with `Schema(_)` (required-field violation)
- Test asserts: a config with `grammar_version: "99.0.0"` fails with `UnsupportedGrammar { version: 99 }`
- Test asserts: the canonical HVAC config from `composer/grammar/v1/examples/hvac.tenant.json` (ADR 0002 Â§Concrete tenant config) validates successfully and round-trips through `config_hash`
- `cargo nextest run -p smbuild-api composer::must_validate` passes
"""

[steps.testPlan]
file = "crates/smbuild-api/src/composer/must_validate.rs"
cases = 4
coverage = "additionalProperties violation rejected (closed-grammar proof, T-7); missing grammar_version rejected; unsupported grammar major rejected; canonical HVAC example from ADR 0002 validates and returns ApprovedConfig with stable config_hash"

