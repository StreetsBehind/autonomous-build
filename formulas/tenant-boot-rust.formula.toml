# tenant-boot-rust: the tenant-boot chokepoint for SMBuild's Rust runtime.
#
# Per ADR 0002 directives #5, #8, #9 + ADR 0003 Â§Decision: this scaffolds the
# `boot_tenant` function whose signature is LOCKED across Phases 1->3->4. The
# composer (Phase 4) extends boot_tenant's body when new grammar versions ship,
# but it does not change the signature. Phase 1 must ship this chokepoint with
# the locked contract so Phase 4's composer lands without retrofit (T-25).
#
# What this formula produces:
# - crates/smbuild-tenantctx with a non-Clone, non-leaky TenantCtx newtype
# - crates/smbuild-api/src/domain/approved_config.rs (the privacy chokepoint â€”
#   no public constructor; only composer::must_validate returns one)
# - crates/smbuild-api/src/composer/must_validate.rs (JSON Schema validation)
# - crates/smbuild-api/src/tenant/{boot,runtime}.rs (the boot fn + runtime struct)
# - crates/smbuild-api/src/transport/tenant_layer.rs (tower::Layer that runs
#   boot_tenant per request, attaches Extension<TenantCtx>+Extension<Arc<TenantRuntime>>,
#   and SET LOCAL app.current_tenant_id for RLS)
# - A doc-test that snapshots the boot_tenant signature so Phase 4 cannot
#   silently drift the contract
# - testcontainers Postgres integration test
#
# Out of scope (separate formulas / phase):
# - The migration that creates the metadata tables â€” that's `migration` formula
#   with up_outline covering Phase-1 directive #3 entities. boot_tenant assumes
#   those tables exist; the migration step is sequenced before this in plan.md.
# - The composer's LLM-driven config emission â€” Phase 4 only (T-25).
# - Per-grammar-version body extension â€” Phase 4 reopens boot.rs to add a
#   match on grammar_version; the SIGNATURE does not move.
#
# Pour-time note: this formula is poured ONCE per app (in Phase 1 of SMBuild).
# Re-pours create duplicate epics â€” use `bd dep add` to attach Phase-4 grammar
# evolution work to the same epic instead of re-pouring.

formula = "tenant-boot-rust"
description = """
Scaffold SMBuild's tenant-boot chokepoint in Rust: non-leaky TenantCtx newtype crate, ApprovedConfig privacy chokepoint, composer::must_validate JSON Schema validator, boot_tenant async fn that loads grammar + metadata tables and returns a TenantRuntime, an Axum tower::Layer that runs boot per request and sets the RLS GUC, plus a doc-test locking boot_tenant's signature across Phase 1->3->4 and a testcontainers integration test. One pour per app in Phase 1; Phase 4 extends bodies, not signatures.
"""
type = "workflow"
version = 1

[vars.grammar_version]
description = "Closed-grammar version this scaffold targets (composer/grammar/v{N}/ directory). Phase 1 ships v1; Phase 4 reopens boot.rs to add additional version arms inside the same locked-signature fn. Integer only â€” appears in paths and in match arms."
required = true
default = "1"

[vars.cache_ttl_secs]
description = "Per-(tenant_id, grammar_version) TenantRuntime cache TTL in seconds. Short by default â€” the boot path reads metadata tables that the composer may mutate; staleness here defeats T-6 (metadata-driven runtime). Phase 4 will lower this further when live tenant edits become a flow."
default = "300"

# =============================================================================
# crates/smbuild-tenantctx â€” the TenantCtx newtype crate
# =============================================================================

[[steps]]
id = "tenantctx-crate"
title = "smbuild-tenantctx: TenantCtx newtype crate (non-Clone, non-leaky)"
type = "feature"
priority = 1
files = [
  "crates/smbuild-tenantctx/Cargo.toml",
  "crates/smbuild-tenantctx/src/lib.rs",
  "crates/smbuild-tenantctx/src/tenant_id.rs",
  "crates/smbuild-tenantctx/README.md",
]
description = """
Create crates/smbuild-tenantctx as a Cargo workspace member. This crate is the only place TenantCtx is defined; every other crate imports it.

**The compile-time chokepoint invariant (T-8):**
- `pub struct TenantCtx` MUST NOT derive `Clone`. The only constructor is `pub(crate) fn new(...)`, called only by `boot_tenant`. Calling code receives a `&TenantCtx` from the Axum extension layer; it cannot construct one out of thin air, and it cannot clone the borrowed one across tenant boundaries.
- A private `_marker: PhantomData<*const ()>` field makes TenantCtx neither Send nor Sync by default. Handler code that spawns must explicitly choose to move it (which requires a wrapper) â€” accidental smuggling across .await points into another tenant's task is a compile error.
- `pub struct TenantId(ulid::Ulid)` is the typed wrapper; `impl TenantId { pub fn new(u: ulid::Ulid) -> Self ... }` is the only constructor. Sqlx adapters live in this crate.

**Cargo.toml [package.metadata.agent]:**
```toml
[package.metadata.agent]
purpose = "Defines TenantCtx and TenantId â€” the compile-time tenant-isolation chokepoint. Non-Clone, non-Send-by-default. Only boot_tenant constructs one."
owned_paths = ["crates/smbuild-tenantctx/"]
invariants = [
  "TenantCtx has no public constructor; only pub(crate) new()",
  "TenantCtx does NOT derive Clone",
  "TenantCtx is !Send by default via PhantomData<*const ()>",
]
local_validate = [
  "cargo fmt --check -p smbuild-tenantctx",
  "cargo clippy -p smbuild-tenantctx --all-targets -- -D warnings",
  "cargo nextest run -p smbuild-tenantctx",
  "cargo test -p smbuild-tenantctx --doc",
]
public_api = ["crates/smbuild-tenantctx/src/lib.rs"]
risk = "high"
consumers = ["smbuild-api", "smbuild-worker", "smbuild-audit"]
```

**Acceptance:**
- `crates/smbuild-tenantctx/Cargo.toml` exists with the metadata.agent block above
- `crates/smbuild-tenantctx/src/lib.rs` declares `pub struct TenantCtx { _marker: PhantomData<*const ()>, tenant_id: TenantId, grammar_version: u32 }` with NO `#[derive(Clone)]` and NO public constructor
- The workspace root Cargo.toml lists `crates/smbuild-tenantctx` in `members`
- `cargo check -p smbuild-tenantctx` succeeds against a fresh checkout
- A doc-test in lib.rs asserts: `// fails to compile: let _ = ctx.clone();` (compile_fail block) â€” proves the !Clone invariant is enforced by the compiler, not just intent
"""

[steps.testPlan]
file = "crates/smbuild-tenantctx/src/lib.rs"
cases = 2
coverage = "compile_fail doc-test rejects TenantCtx::clone() (invariant: non-Clone); compile_fail doc-test rejects sending TenantCtx across an await boundary into another task (invariant: !Send-by-default)"

